<div class="page-wrapper">

  <div class="sidebar">
    <div class="sidebar-brand">
      <span class="logo-icon">⬡</span>
      <span class="brand-name">BOOKSMART</span>
    </div>

    <nav class="nav-links">
      <a class="nav-item active">
        <!--<span class="nav-icon">📅</span>--> Book Appointment
      </a>
      <a class="nav-item" (click)="router.navigate(['/dashboard'])">
        <!--<span class="nav-icon">◧</span>--> Dashboard
      </a>
      <a class="nav-item" (click)="router.navigate(['/login'])">
        <span class="nav-icon">→</span> Sign Out
      </a>
    </nav>

    <div class="sidebar-footer">
      AI Appointment Demand<br>Prediction System
    </div>
  </div>

  <div class="main-content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Book an Appointment</h1>
        <p class="page-subtitle">Fill in the details below to schedule your visit</p>
      </div>
    </div>

    <div class="form-card">

      <form (ngSubmit)="onSubmit()" #bookingForm="ngForm" novalidate>

        <div class="form-grid">

          <div class="field-group">
            <label class="field-label">Doctor Name <span class="required">*</span></label>
            <div class="input-wrapper">
              <!--<span class="input-icon">👨‍⚕️</span>-->
              <input type="text" name="doctorName" [(ngModel)]="doctorName"
                placeholder="e.g. Dr. Sarah Ahmed" class="field-input" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Specialization <span class="required">*</span></label>
            <div class="input-wrapper">
              <!--<span class="input-icon">🏥</span>-->
              <select name="specialization" [(ngModel)]="specialization" class="field-input select-input">
                <option value="" disabled>Select specialization</option>
                <option *ngFor="let s of specializations" [value]="s">{{ s }}</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Appointment Date <span class="required">*</span></label>
            <div class="input-wrapper">
              <!--<span class="input-icon">📆</span>-->
              <input type="date" name="appointmentDate" [(ngModel)]="appointmentDate"
                [min]="minDate" class="field-input" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Time Slot <span class="required">*</span></label>
            <div class="input-wrapper">
              <!--<span class="input-icon">🕐</span>-->
              <select name="appointmentTime" [(ngModel)]="appointmentTime" class="field-input select-input">
                <option value="" disabled>Select time slot</option>
                <option *ngFor="let t of timeSlots" [value]="t">{{ t }}</option>
              </select>
            </div>
          </div>

        </div>

        <div class="field-group full-width">
          <label class="field-label">Notes <span class="optional">(optional)</span></label>
          <div class="input-wrapper">
            <textarea name="notes" [(ngModel)]="notes"
              placeholder="Describe your symptoms or reason for visit..."
              class="field-input textarea-input" rows="4"></textarea>
          </div>
        </div>

        <div class="error-box" *ngIf="errorMessage">
          <span class="error-icon">!</span>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="success-box" *ngIf="successMessage">
          <span class="success-icon">✓</span>
          <span>{{ successMessage }}</span>
        </div>

        <div class="form-actions">
          <button type="button" class="cancel-btn" (click)="resetForm()">Clear</button>
          <button type="submit" class="submit-btn" [disabled]="isLoading">
            <span *ngIf="!isLoading">Confirm Booking</span>
            <span *ngIf="isLoading" class="spinner-text">
              <span class="spinner"></span> Booking...
            </span>
          </button>
        </div>

      </form>

    </div>

  </div>

</div>
